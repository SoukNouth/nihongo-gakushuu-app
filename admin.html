<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>問題追加 </title>
    <link rel="stylesheet" href="sanitize.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: "M PLUS Rounded 1c", sans-serif;
            background: linear-gradient(135deg, #c9e8ff 0%, #fde8d8 60%, #d4f5c4 100%);
            min-height: 100vh;
            padding: 30px 20px;
            margin: 0;
        }

        .admin-container {
            max-width: 580px;
            margin: 0 auto;
            background: #fff;
            padding: 32px 28px;
            border-radius: 24px;
            border: 3px solid #000;
            box-shadow: 0 8px 0 #aaa, 0 10px 20px rgba(0,0,0,0.15);
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 900;
            color: #222;
            margin: 0 0 20px 0;
        }

        .connection-box {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 14px;
            margin-bottom: 24px;
            border-radius: 10px;
            border: 2px solid #a5d6a7;
            font-size: 0.9rem;
            font-weight: 700;
            text-align: center;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: 900;
            font-size: 1rem;
            color: #333;
            margin-bottom: 6px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #bbb;
            border-radius: 12px;
            font-size: 1rem;
            font-family: "M PLUS Rounded 1c", sans-serif;
            transition: border-color 0.2s;
            outline: none;
        }
        input[type="text"]:focus, select:focus { border-color: #4fc3f7; }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #bbb;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: "M PLUS Rounded 1c", sans-serif;
            background: #fafafa;
            cursor: pointer;
        }

        small { display: block; margin-top: 6px; color: #888; font-size: 0.8rem; }

        button.save-btn {
            background-color: #4fc3f7;
            color: white;
            border: 3px solid #000;
            padding: 14px;
            width: 100%;
            font-size: 1.2rem;
            font-family: "M PLUS Rounded 1c", sans-serif;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0277bd, 0 8px 10px rgba(0,0,0,0.2);
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
            margin-top: 4px;
        }
        button.save-btn:hover { transform: scale(1.03); }
        button.save-btn:active { transform: translateY(5px); box-shadow: 0 1px 0 #0277bd; }
        button.save-btn:disabled { background-color: #ccc; box-shadow: none; cursor: not-allowed; transform: none; }

        #status {
            margin-top: 14px;
            font-weight: 700;
            padding: 10px 14px;
            border-radius: 10px;
            display: none;
            text-align: center;
            background: #f5f5f5;
        }

        .recent-section { margin-top: 36px; border-top: 2px solid #eee; padding-top: 24px; }

        .recent-title {
            font-size: 1.2rem;
            font-weight: 900;
            color: #222;
            margin-bottom: 14px;
        }

        .question-item {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            padding: 10px 14px;
            margin-bottom: 10px;
            border-radius: 14px;
            gap: 12px;
            transition: border-color 0.2s;
        }
        .question-item:hover { border-color: #4fc3f7; }

        .question-thumb {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #ddd;
            flex-shrink: 0;
        }

        .question-item > div { flex: 1; }
        .question-item .q-title { font-weight: 900; font-size: 1.05rem; color: #222; }
        .question-item .q-sub { font-size: 0.82rem; color: #888; margin-top: 2px; }

        .delete-btn {
            background-color: #ff6b6b;
            color: white;
            border: 2px solid #000;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: "M PLUS Rounded 1c", sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: 0 3px 0 #c0392b;
            transition: transform 0.1s;
            flex-shrink: 0;
        }
        .delete-btn:hover { transform: scale(1.05); }
        .delete-btn:active { transform: translateY(2px); box-shadow: none; }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #4fc3f7;
            font-weight: 900;
            font-size: 1rem;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>📝 問題追加</h1>
    <div id="connection-status" class="connection-box">データベースに接続中</div>

    <div class="form-group">
        <label>1. カテゴリー</label>
        <select id="category">
            <option value="2">2語文 (例: あおいくるま)</option>
            <option value="3">3語文 (例: こどもがぱんをたべる)</option>
        </select>
    </div>

    <div class="form-group">
        <label>2. せいかいの文 (ひらがな)</label>
        <input type="text" id="sentence" placeholder="例: あおいくるま">
    </div>

    <div class="form-group">
        <label>3. なぞる文字 (1文字)</label>
        <input type="text" id="traceChar" placeholder="例: い">
    </div>

    <div class="form-group">
        <label>4. イラスト画像</label>
        <input type="file" id="imageFile" accept="image/*">
        <small>※自動的に圧縮してデータベースに保存されます</small>
    </div>

    <button id="uploadBtn" class="save-btn">保存する</button>
    <p id="status"></p>


    <div class="recent-section">
        <div class="recent-title">📸 最近追加された問題</div>
        <div id="questionsList">
            <p style="color:#777; font-size:0.9em;">読み込み中... </p>
        </div>
    </div>

    <a href="index.html" class="back-link">← ゲームに戻る</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
   
    import { getFirestore, collection, addDoc, getDocs, limit, query, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    
    const firebaseConfig = {
        apiKey: "AIzaSyAVvYZLRnhXw0r_L9qsWYKu2kQZmOyJSLs",
        authDomain: "nihongo-naraimashou.firebaseapp.com",
        projectId: "nihongo-naraimashou",
        storageBucket: "nihongo-naraimashou.appspot.com",
        messagingSenderId: "555772220708",
        appId: "1:555772220708:web:230347906896dd49390fb1"
    };

    const statusBox = document.getElementById('connection-status');
    let db;

    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        testConnection();
    } catch(e) {
        showStatus("Config Error: " + e.message, "red");
    }

    async function testConnection() {
        try {
          
            await loadRecentQuestions();
            statusBox.textContent = "✅ データベースに接続した";
        } catch (e) {
            console.error(e);
            statusBox.textContent = "❌ 接続エラー " + e.message;
            statusBox.style.background = "#ffebee";
            statusBox.style.color = "#c62828";
        }
    }


    const resizeImage = (file) => {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; 
                    const scaleSize = MAX_WIDTH / img.width;
                    const width = (img.width > MAX_WIDTH) ? MAX_WIDTH : img.width;
                    const height = (img.width > MAX_WIDTH) ? (img.height * scaleSize) : img.height;

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                };
                img.onerror = (error) => reject(error);
            };
        });
    };

    
    async function loadRecentQuestions() {
        const listContainer = document.getElementById('questionsList');
        try {
            
            const querySnapshot = await getDocs(collection(db, "questions"));
            let questions = [];
            
            querySnapshot.forEach((doc) => {
                questions.push({ id: doc.id, ...doc.data() });
            });

           
            questions.sort((a, b) => {
                const dateA = a.createdAt?.seconds || 0;
                const dateB = b.createdAt?.seconds || 0;
                return dateB - dateA; 
            });

          
            const recent = questions.slice(0, 5);

            if (recent.length === 0) {
                listContainer.innerHTML = "<p>まだ問題がありません </p>";
                return;
            }

            let html = "";
            recent.forEach(q => {
              
                const tracePart = q.parts ? q.parts.find(p => p.type === 'trace') : null;
                const traceChar = tracePart ? tracePart.text : '?';
                const fullText = q.parts ? q.parts.map(p => p.text).join('') : 'Unknown';
                
                html += `
                    <div class="question-item">
                        <img src="${q.image}" class="question-thumb" alt="Question Image">
                        <div>
                            <div class="q-title">${fullText}</div>
                            <div class="q-sub">カテゴリー: ${q.category}語文 | なぞり: 「${traceChar}」</div>
                        </div>
                        <button class="delete-btn" data-id="${q.id}">削除</button>
                    </div>
                `;
            });
            listContainer.innerHTML = html;

           
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    if(confirm("本当にこの問題を削除しますか？ (Delete this question?)")) {
                        await deleteQuestion(id);
                    }
                });
            });

        } catch (e) {
            console.error("List Load Error:", e);
            listContainer.innerHTML = "<p style='color:red'>読み込みエラー </p>";
        }
    }

   
    async function deleteQuestion(id) {
        try {
            await deleteDoc(doc(db, "questions", id));
            showStatus("削除しました ", "orange");
            loadRecentQuestions(); 
        } catch (e) {
            console.error("Delete Error:", e);
            showStatus("削除エラー: " + e.message, "red");
        }
    }

   
    document.getElementById('uploadBtn').addEventListener('click', async () => {
        const btn = document.getElementById('uploadBtn');
        const category = parseInt(document.getElementById('category').value);
        const sentence = document.getElementById('sentence').value.trim();
        const traceChar = document.getElementById('traceChar').value.trim();
        const file = document.getElementById('imageFile').files[0];

        if (!sentence || !traceChar || !file) {
            alert("すべて入力してください！");
            return;
        }

        btn.disabled = true;
        btn.textContent = "処理中... (Processing)";
        showStatus("画像を圧縮中... (Compressing Image)", "blue");

        try {
            const base64Image = await resizeImage(file);
            
            const letters = sentence.split('');
            const parts = letters.map(char => {
                return (char === traceChar) ? { type: 'trace', text: char } : { type: 'select', text: char };
            });

            showStatus("データベースに保存中... ", "blue");
            
            await addDoc(collection(db, "questions"), {
                category: category,
                image: base64Image,
                parts: parts,
                createdAt: new Date()
            });

            showStatus("✅ 保存しました！ ", "green");
            
            
            await loadRecentQuestions();
            
           
            document.getElementById('sentence').value = "";
            document.getElementById('traceChar').value = "";
            document.getElementById('imageFile').value = "";
            
        } catch (error) {
            console.error("Error:", error);
            showStatus("❌ エラー: " + error.message, "red");
        } finally {
            btn.disabled = false;
            btn.textContent = "保存する ";
        }
    });

    function showStatus(msg, color) {
        const el = document.getElementById('status');
        el.style.display = 'block';
        el.textContent = msg;
        el.style.color = color;
    }
</script>

</body>
</html>
