<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>管理画面</title>
    <link rel="stylesheet" href="sanitize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: "M PLUS Rounded 1c", sans-serif;
            background: linear-gradient(135deg, #c9e8ff 0%, #fde8d8 60%, #d4f5c4 100%);
            min-height: 100vh;
            padding: 24px 16px 40px;
            padding-left: max(16px, env(safe-area-inset-left));
            padding-right: max(16px, env(safe-area-inset-right));
            margin: 0;
        }

        .admin-container {
            max-width: 860px;
            margin: 0 auto;
        }

        h1 {
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 900;
            color: #222;
            margin: 0 0 16px;
        }

        /* ── タブナビ ── */
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab-nav-btn {
            flex: 1;
            font-family: "M PLUS Rounded 1c", sans-serif;
            font-weight: 900;
            font-size: clamp(0.9rem, 2vw, 1.15rem);
            padding: 12px 8px;
            border-radius: 14px 14px 0 0;
            border: 3px solid #000;
            border-bottom: none;
            background: #ccc;
            color: #555;
            cursor: pointer;
            transition: background 0.15s;
        }

        .tab-nav-btn.active {
            background: #fff;
            color: #222;
            border-bottom: 3px solid #fff;
            margin-bottom: -3px;
            z-index: 1;
            position: relative;
        }

        /* ── タブパネル ── */
        .tab-panel {
            display: none;
            background: #fff;
            border: 3px solid #000;
            border-radius: 0 14px 14px 14px;
            padding: 28px 28px;
            box-shadow: 0 8px 0 #aaa;
        }

        .tab-panel.active { display: block; }

        /* iPad: 問題タブは2カラム */
        @media (min-width: 700px) {
            #panel-mondai .form-cols {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0 24px;
            }
            #panel-mondai .form-cols .form-group:last-child {
                grid-column: 1 / -1;
            }
        }

        /* ── 共通フォームパーツ ── */
        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: 900;
            font-size: 1rem;
            color: #333;
            margin-bottom: 6px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #bbb;
            border-radius: 14px;
            font-size: 1.05rem;
            font-family: "M PLUS Rounded 1c", sans-serif;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        input[type="text"]:focus, select:focus { border-color: #4fc3f7; }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed #bbb;
            border-radius: 14px;
            font-size: 1rem;
            background: #fafafa;
            cursor: pointer;
        }

        small { display: block; margin-top: 5px; color: #888; font-size: 0.82rem; }

        .save-btn {
            background: #4fc3f7;
            color: white;
            border: 3px solid #000;
            padding: 16px;
            width: 100%;
            font-size: 1.2rem;
            font-family: "M PLUS Rounded 1c", sans-serif;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0277bd;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            transition: transform 0.15s, box-shadow 0.15s;
            margin-top: 4px;
        }
        .save-btn:hover   { transform: scale(1.03); }
        .save-btn:active  { transform: translateY(5px); box-shadow: 0 1px 0 #0277bd; }
        .save-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; transform: none; }

        .status-msg {
            margin-top: 12px;
            font-weight: 700;
            padding: 9px 13px;
            border-radius: 10px;
            display: none;
            text-align: center;
            background: #f5f5f5;
            font-size: 0.95rem;
        }

        /* ── セクション区切り ── */
        .section-title {
            font-size: 1.1rem;
            font-weight: 900;
            color: #222;
            margin: 24px 0 12px;
            border-top: 2px solid #eee;
            padding-top: 18px;
        }

        /* ── カードリスト（問題・生徒共通） ── */
        .item-card {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            padding: 10px 12px;
            margin-bottom: 10px;
            border-radius: 14px;
            gap: 10px;
            transition: border-color 0.2s;
        }
        .item-card:hover { border-color: #4fc3f7; }

        .item-thumb {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #ddd;
            flex-shrink: 0;
        }

        .item-thumb-circle {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #ddd;
            flex-shrink: 0;
            background: #e0f7fa;
        }

        .item-info { flex: 1; }
        .item-title { font-weight: 900; font-size: 1.05rem; color: #222; }
        .item-sub   { font-size: 0.85rem; color: #888; margin-top: 3px; }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: 2px solid #000;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-family: "M PLUS Rounded 1c", sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #c0392b;
            transition: transform 0.1s;
            flex-shrink: 0;
        }
        .delete-btn:hover  { transform: scale(1.05); }
        .delete-btn:active { transform: translateY(2px); box-shadow: none; }

        /* ── 問題設定ボタン ── */
        .assign-btn {
            background: #69f0ae;
            color: white;
            border: 2px solid #000;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-family: "M PLUS Rounded 1c", sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #00897b;
            transition: transform 0.1s;
            flex-shrink: 0;
        }
        .assign-btn:hover  { transform: scale(1.05); }
        .assign-btn:active { transform: translateY(2px); box-shadow: none; }

        /* iPad: 生徒・問題リストを2カラムグリッド */
        @media (min-width: 700px) {
            #questionsList, #studentsList {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            #questionsList .item-card,
            #studentsList .item-card { margin-bottom: 0; }
        }

        /* ── 問題割り当てモーダル ── */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-bg.open { display: flex; }

        .modal-box {
            background: #fff;
            border: 3px solid #000;
            border-radius: 20px;
            padding: 28px 24px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .modal-box h3 {
            font-size: 1.3rem;
            font-weight: 900;
            margin: 0 0 16px;
        }

        .q-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .q-check-card {
            border: 2.5px solid #ccc;
            border-radius: 12px;
            padding: 8px 6px 6px;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.15s, background 0.15s;
        }
        .q-check-card.selected {
            border-color: #4fc3f7;
            background: #e0f7fa;
        }

        .q-check-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }

        .q-check-card .q-word {
            font-size: 0.8rem;
            font-weight: 900;
            margin-top: 4px;
            color: #333;
        }

        .q-section-label {
            grid-column: 1 / -1;
            font-size: 0.85rem;
            font-weight: 900;
            color: #555;
            padding: 6px 2px 2px;
            border-bottom: 2px solid #eee;
            margin-bottom: 4px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .btn-save-assign {
            flex: 1;
            background: #4fc3f7;
            color: #fff;
            border: 2px solid #000;
            padding: 11px;
            border-radius: 50px;
            font-family: "M PLUS Rounded 1c", sans-serif;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #0277bd;
            text-shadow: 1px 1px 0 #000;
        }

        .btn-cancel {
            flex: 1;
            background: #ccc;
            color: #555;
            border: 2px solid #000;
            padding: 11px;
            border-radius: 50px;
            font-family: "M PLUS Rounded 1c", sans-serif;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #999;
        }

        /* ── 進捗タブ ── */
        .progress-student {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            margin-bottom: 14px;
            overflow: hidden;
        }

        .progress-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            cursor: pointer;
            background: #f0f0f0;
        }
        .progress-header:hover { background: #e8f5fb; }

        .progress-header img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ccc;
        }

        .progress-header .p-name { font-weight: 900; font-size: 1.05rem; flex: 1; }
        .progress-header .p-arrow { font-size: 1rem; color: #888; }

        /* iPad: 進捗を2カラム */
        @media (min-width: 700px) {
            #progressList {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }
            #progressList .progress-student { margin-bottom: 0; }
        }

        .progress-body {
            display: none;
            padding: 10px 14px 14px;
        }
        .progress-body.open { display: block; }

        .scores-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .scores-table th {
            background: #e0f7fa;
            padding: 6px 10px;
            text-align: left;
            font-weight: 900;
            border-bottom: 2px solid #b2ebf2;
        }
        .scores-table td {
            padding: 6px 10px;
            border-bottom: 1px solid #eee;
        }
        .score-perfect { color: #00897b; font-weight: 900; }

        .no-scores { color: #aaa; font-size: 0.88rem; padding: 6px 0; }

        /* ── 接続ステータス ── */
        .connection-box {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 9px 13px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 2px solid #a5d6a7;
            font-size: 0.88rem;
            font-weight: 700;
            text-align: center;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #4fc3f7;
            font-weight: 900;
            font-size: 0.95rem;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="admin-container">
    <h1>管理画面</h1>
    <div id="connection-status" class="connection-box">データベースに接続中…</div>

    <!-- タブナビ -->
    <div class="tab-nav">
        <button class="tab-nav-btn active" data-tab="mondai">📝 問題</button>
        <button class="tab-nav-btn"        data-tab="seito" >👤 生徒</button>
        <button class="tab-nav-btn"        data-tab="shinkoku">📊 進捗</button>
    </div>

    <!-- ── 問題タブ ── -->
    <div id="panel-mondai" class="tab-panel active">
        <div class="form-cols">
            <div class="form-group">
                <label>1. カテゴリー</label>
                <select id="category">
                    <option value="2">2語文 (例: あおいくるま)</option>
                    <option value="3">3語文 (例: こどもがぱんをたべる)</option>
                </select>
            </div>
            <div class="form-group">
                <label>2. せいかいの文 (ひらがな)</label>
                <input type="text" id="sentence" placeholder="例: あおいくるま">
            </div>
            <div class="form-group">
                <label>3. なぞる文字 (1文字)</label>
                <input type="text" id="traceChar" placeholder="例: い">
            </div>
            <div class="form-group">
                <label>4. イラスト画像</label>
                <input type="file" id="imageFile" accept="image/*">
                <small>※自動的に圧縮してデータベースに保存されます</small>
            </div>
        </div>
        <button id="uploadBtn" class="save-btn">保存する</button>
        <p id="status-mondai" class="status-msg"></p>

        <div class="section-title">📸 最近追加された問題</div>
        <div id="questionsList"><p style="color:#777;font-size:0.9em;">読み込み中…</p></div>

        <a href="students.html" class="back-link">← もどる</a>
    </div>

    <!-- ── 生徒タブ ── -->
    <div id="panel-seito" class="tab-panel">
        <div class="form-group">
            <label>1. 生徒の名前</label>
            <input type="text" id="studentName" placeholder="例: たろう">
        </div>
        <div class="form-group">
            <label>2. 写真 (省略可)</label>
            <input type="file" id="studentPhoto" accept="image/*">
            <small>※自動的に圧縮されます。省略すると既定の画像が使われます。</small>
        </div>
        <button id="addStudentBtn" class="save-btn">生徒を追加</button>
        <p id="status-seito" class="status-msg"></p>

        <div class="section-title">👤 生徒一覧</div>
        <div id="studentsList"><p style="color:#777;font-size:0.9em;">読み込み中…</p></div>
    </div>

    <!-- ── 進捗タブ ── -->
    <div id="panel-shinkoku" class="tab-panel">
        <p style="color:#555;font-size:0.9em;margin:0 0 16px">生徒名をタップするとスコア履歴が見られます。</p>
        <div id="progressList"><p style="color:#777;font-size:0.9em;">読み込み中…</p></div>
    </div>
</div>

<!-- 問題割り当てモーダル -->
<div id="assign-modal" class="modal-bg">
    <div class="modal-box">
        <h3 id="assign-modal-title">問題を選ぶ</h3>
        <div id="q-grid" class="q-grid"></div>
        <div class="modal-actions">
            <button class="btn-save-assign" id="btn-save-assign">保存する</button>
            <button class="btn-cancel"      id="btn-cancel-assign">キャンセル</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore, collection, addDoc, getDocs, deleteDoc,
    doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { localQuestions } from './local_questions.js';

const firebaseConfig = {
    apiKey: "AIzaSyAVvYZLRnhXw0r_L9qsWYKu2kQZmOyJSLs",
    authDomain: "nihongo-naraimashou.firebaseapp.com",
    projectId: "nihongo-naraimashou",
    storageBucket: "nihongo-naraimashou.appspot.com",
    messagingSenderId: "555772220708",
    appId: "1:555772220708:web:230347906896dd49390fb1"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const statusBox = document.getElementById('connection-status');

// ────────────────────────────
//  タブ切り替え
// ────────────────────────────
document.querySelectorAll('.tab-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');

        if (btn.dataset.tab === 'seito')    loadStudents();
        if (btn.dataset.tab === 'shinkoku') loadProgress();
    });
});

// ────────────────────────────
//  画像圧縮ユーティリティ
// ────────────────────────────
function resizeImage(file, maxWidth = 800) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const scale  = (img.width > maxWidth) ? maxWidth / img.width : 1;
                canvas.width  = img.width  * scale;
                canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.onerror = reject;
        };
    });
}

function showStatus(id, msg, color) {
    const el = document.getElementById(id);
    el.style.display = 'block';
    el.textContent   = msg;
    el.style.color   = color;
}

// ────────────────────────────
//  問題タブ
// ────────────────────────────
async function testConnection() {
    try {
        await loadRecentQuestions();
        statusBox.textContent = "✅ データベースに接続した";
    } catch(e) {
        statusBox.textContent = "❌ 接続エラー: " + e.message;
        statusBox.style.background = "#ffebee";
        statusBox.style.color = "#c62828";
    }
}

async function loadRecentQuestions() {
    const list = document.getElementById('questionsList');
    const snap = await getDocs(collection(db, "questions"));
    let qs = [];
    snap.forEach(d => qs.push({ id: d.id, ...d.data() }));
    qs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

    const recent = qs.slice(0, 8);
    if (recent.length === 0) { list.innerHTML = "<p>まだ問題がありません</p>"; return; }

    list.innerHTML = recent.map(q => {
        const word  = q.parts ? q.parts.map(p => p.text).join('') : '?';
        const trace = q.parts ? (q.parts.find(p => p.type === 'trace')?.text || '?') : '?';
        return `
        <div class="item-card">
            <img src="${q.image}" class="item-thumb" alt="">
            <div class="item-info">
                <div class="item-title">${word}</div>
                <div class="item-sub">カテゴリー: ${q.category}語文 | なぞり: 「${trace}」</div>
            </div>
            <button class="delete-btn" data-id="${q.id}">削除</button>
        </div>`;
    }).join('');

    list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            if (confirm("この問題を削除しますか？")) {
                await deleteDoc(doc(db, "questions", btn.dataset.id));
                showStatus('status-mondai', "削除しました", "orange");
                loadRecentQuestions();
            }
        });
    });
}

document.getElementById('uploadBtn').addEventListener('click', async () => {
    const btn      = document.getElementById('uploadBtn');
    const category = parseInt(document.getElementById('category').value);
    const sentence = document.getElementById('sentence').value.trim();
    const traceChar= document.getElementById('traceChar').value.trim();
    const file     = document.getElementById('imageFile').files[0];

    if (!sentence || !traceChar || !file) { alert("すべて入力してください！"); return; }

    btn.disabled    = true;
    btn.textContent = "処理中…";
    showStatus('status-mondai', "画像を圧縮中…", "blue");

    try {
        const base64 = await resizeImage(file);
        const parts  = sentence.split('').map(c =>
            ({ type: c === traceChar ? 'trace' : 'select', text: c }));

        await addDoc(collection(db, "questions"), {
            category, image: base64, parts, createdAt: new Date()
        });

        showStatus('status-mondai', "✅ 保存しました！", "green");
        document.getElementById('sentence').value  = '';
        document.getElementById('traceChar').value = '';
        document.getElementById('imageFile').value = '';
        loadRecentQuestions();
    } catch(e) {
        showStatus('status-mondai', "❌ エラー: " + e.message, "red");
    } finally {
        btn.disabled    = false;
        btn.textContent = "保存する";
    }
});

// ────────────────────────────
//  生徒タブ
// ────────────────────────────
let studentsCache  = [];
let questionsCache = [];

async function loadStudents() {
    const list = document.getElementById('studentsList');
    const snap = await getDocs(collection(db, "students"));
    studentsCache = [];
    snap.forEach(d => studentsCache.push({ id: d.id, ...d.data() }));
    studentsCache.sort((a, b) => a.name.localeCompare(b.name, 'ja'));

    if (studentsCache.length === 0) {
        list.innerHTML = "<p style='color:#777'>まだ生徒がいません</p>";
        return;
    }

    list.innerHTML = studentsCache.map(s => {
        const assigned = s.assignedQuestionIds?.length || 0;
        const photoSrc = s.photo || 'computer_tokui_boy.png';
        return `
        <div class="item-card">
            <img src="${photoSrc}" class="item-thumb-circle" alt="${s.name}"
                 onerror="this.src='computer_tokui_boy.png'">
            <div class="item-info">
                <div class="item-title">${s.name}</div>
                <div class="item-sub">割り当て問題: ${assigned}問</div>
            </div>
            <button class="assign-btn" data-id="${s.id}" data-name="${s.name}">問題設定</button>
            <button class="delete-btn" data-id="${s.id}">削除</button>
        </div>`;
    }).join('');

    list.querySelectorAll('.assign-btn').forEach(btn => {
        btn.addEventListener('click', () => openAssignModal(btn.dataset.id, btn.dataset.name));
    });
    list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            if (confirm(`「${btn.closest('.item-card').querySelector('.item-title').textContent}」を削除しますか？`)) {
                await deleteDoc(doc(db, "students", btn.dataset.id));
                showStatus('status-seito', "削除しました", "orange");
                loadStudents();
            }
        });
    });
}

document.getElementById('addStudentBtn').addEventListener('click', async () => {
    const btn   = document.getElementById('addStudentBtn');
    const name  = document.getElementById('studentName').value.trim();
    const file  = document.getElementById('studentPhoto').files[0];

    if (!name) { alert("名前を入力してください！"); return; }

    btn.disabled    = true;
    btn.textContent = "処理中…";

    try {
        let photo = '';
        if (file) {
            showStatus('status-seito', "写真を圧縮中…", "blue");
            photo = await resizeImage(file, 400); // 生徒写真は小さめに
        }

        await addDoc(collection(db, "students"), {
            name, photo,
            assignedQuestionIds: [],
            createdAt: new Date()
        });

        showStatus('status-seito', `✅ 「${name}」を追加しました！`, "green");
        document.getElementById('studentName').value  = '';
        document.getElementById('studentPhoto').value = '';
        loadStudents();
    } catch(e) {
        showStatus('status-seito', "❌ エラー: " + e.message, "red");
    } finally {
        btn.disabled    = false;
        btn.textContent = "生徒を追加";
    }
});

// ────────────────────────────
//  問題割り当てモーダル
// ────────────────────────────
let assignStudentId   = null;
let selectedQuestionIds = new Set();

function renderQGrid(allQ) {
    const grid = document.getElementById('q-grid');

    function makeCard(q, qid) {
        const word     = q.parts ? q.parts.map(p => p.text).join('') : '?';
        const selected = selectedQuestionIds.has(qid) ? 'selected' : '';
        return `<div class="q-check-card ${selected}" data-id="${qid}">
            <img src="${q.image}" alt="${word}" onerror="this.style.display='none'">
            <div class="q-word">${word}</div>
        </div>`;
    }

    const localCards  = localQuestions.map(q => makeCard(q, q.id)).join('');
    const remoteCards = allQ.map(q => makeCard(q, q.id)).join('');

    const remoteSect = allQ.length > 0
        ? `<div class="q-section-label">📁 追加した問題</div>${remoteCards}`
        : '';

    grid.innerHTML = `<div class="q-section-label">🖼️ もともとの問題</div>${localCards}${remoteSect}`;

    grid.querySelectorAll('.q-check-card').forEach(card => {
        card.addEventListener('click', () => {
            const id = card.dataset.id;
            if (selectedQuestionIds.has(id)) {
                selectedQuestionIds.delete(id);
                card.classList.remove('selected');
            } else {
                selectedQuestionIds.add(id);
                card.classList.add('selected');
            }
        });
    });
}

async function openAssignModal(studentId, studentName) {
    assignStudentId = studentId;

    if (questionsCache.length === 0) {
        const snap = await getDocs(collection(db, "questions"));
        snap.forEach(d => questionsCache.push({ id: d.id, ...d.data() }));
    }

    const student = studentsCache.find(s => s.id === studentId);
    selectedQuestionIds = new Set(student?.assignedQuestionIds || []);

    document.getElementById('assign-modal-title').textContent = `「${studentName}」の問題を選ぶ`;
    renderQGrid(questionsCache);
    document.getElementById('assign-modal').classList.add('open');
}

document.getElementById('btn-save-assign').addEventListener('click', async () => {
    if (!assignStudentId) return;
    try {
        await updateDoc(doc(db, "students", assignStudentId), {
            assignedQuestionIds: [...selectedQuestionIds]
        });
        document.getElementById('assign-modal').classList.remove('open');
        // キャッシュを更新
        const s = studentsCache.find(s => s.id === assignStudentId);
        if (s) s.assignedQuestionIds = [...selectedQuestionIds];
        loadStudents();
    } catch(e) {
        alert("保存エラー: " + e.message);
    }
});

document.getElementById('btn-cancel-assign').addEventListener('click', () => {
    document.getElementById('assign-modal').classList.remove('open');
});

document.getElementById('assign-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// ────────────────────────────
//  進捗タブ
// ────────────────────────────
async function loadProgress() {
    const list = document.getElementById('progressList');
    list.innerHTML = '<p style="color:#777;font-size:0.9em;">読み込み中…</p>';

    const [studentsSnap, scoresSnap] = await Promise.all([
        getDocs(collection(db, "students")),
        getDocs(collection(db, "scores"))
    ]);

    const students = [];
    studentsSnap.forEach(d => students.push({ id: d.id, ...d.data() }));
    students.sort((a, b) => a.name.localeCompare(b.name, 'ja'));

    const scoresByStudent = {};
    scoresSnap.forEach(d => {
        const s = d.data();
        if (!scoresByStudent[s.studentId]) scoresByStudent[s.studentId] = [];
        scoresByStudent[s.studentId].push(s);
    });

    if (students.length === 0) {
        list.innerHTML = '<p style="color:#777">まだ生徒がいません</p>';
        return;
    }

    list.innerHTML = students.map(student => {
        const scores  = (scoresByStudent[student.id] || [])
            .sort((a, b) => (b.date?.seconds || 0) - (a.date?.seconds || 0));
        const photoSrc = student.photo || 'computer_tokui_boy.png';

        const rows = scores.length === 0
            ? `<p class="no-scores">まだ記録がありません</p>`
            : `<table class="scores-table">
                <tr><th>日付</th><th>種類</th><th>スコア</th></tr>
                ${scores.slice(0, 10).map(sc => {
                    const dateStr = sc.date?.toDate
                        ? sc.date.toDate().toLocaleDateString('ja-JP')
                        : (sc.date ? new Date(sc.date.seconds * 1000).toLocaleDateString('ja-JP') : '?');
                    const isPerfect = sc.score === sc.total;
                    return `<tr>
                        <td>${dateStr}</td>
                        <td>${sc.category}語文</td>
                        <td class="${isPerfect ? 'score-perfect' : ''}">${sc.score}/${sc.total}${isPerfect ? ' ⭐' : ''}</td>
                    </tr>`;
                }).join('')}
               </table>`;

        return `
        <div class="progress-student">
            <div class="progress-header" onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('.p-arrow').textContent = this.nextElementSibling.classList.contains('open') ? '▲' : '▼'">
                <img src="${photoSrc}" alt="${student.name}" onerror="this.src='computer_tokui_boy.png'">
                <span class="p-name">${student.name}</span>
                <span class="p-arrow">▼</span>
            </div>
            <div class="progress-body">${rows}</div>
        </div>`;
    }).join('');
}

testConnection();
