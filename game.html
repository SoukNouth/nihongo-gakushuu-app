<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゲーム画面 (Game Page)</title>
     <link rel="stylesheet" href="./sanitize.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rampart+One&family=M+PLUS+Rounded+1c:wght@700;800;900&display=swap" rel="stylesheet">
  
   
    <link rel="stylesheet" href="game_style_v3.css?v=4">
</head>
<body>
<header class="game-header">
       
        <button id="open-menu-btn" class="menu-button-header">メニュー</button>
        <div id="student-name-display" class="student-name-header"></div>
        <div id="question-counter" class="question-counter"></div>
    </header>


    <main class="game-container">

        <div class="middle-game-area">
           
            <div class="tracing-area-container">
             <div class="canvas-wrapper">
                <img id="question-image" src="" alt="Question Image">
                
                
                <div id="feedback-maru" class="feedback-overlay">〇</div>
                <div id="feedback-batsu" class="feedback-overlay">❌</div>
            </div>
            </div>
        
            <div id="answer-slots-container" class="answer-slots-container">
                <div class="answer-slot"></div>
                <div class="answer-slot"></div>
                <div class="answer-slot"></div>
                <div class="answer-slot"></div>
                <div class="answer-slot"></div>
            </div>
        </div>

        <!-- ④ キーボードエリア（下部に固定） -->
        <div class="keyboard-area">
            <div class="keyboard-header">
                <button id="keyboard-toggle-btn" class="keyboard-toggle">がざだ…</button>
            </div>
            <div id="hiragana-container" class="hiragana-grid-container"></div>
            <div id="hiragana-dakuten-container" class="hiragana-grid-container hidden"></div>
        </div>

    </main>

    <div id="menu-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>メニュー</h2>
            <button id="close-menu-btn" class="modal-close-button">ゲームにもどる</button>
            <a class="modal-return"href="page2.html">メニューにもどる</a>
        </div>
    </div>

    
    <div id="tracing-modal" class="modal-overlay">
        <div class="modal-content tracing-content">
            <div class="trace-buttons">
                <button id="undo-btn">もどる</button>
                <button id="clear-btn">けす</button>
                <button id="done-btn">できた</button>
            </div>
            <!-- ① 先生の手動採点ボタン（採点オフ時に表示） -->
            <div id="teacher-judge" class="teacher-judge hidden">
                <button id="judge-correct">○ せいかい</button>
                <button id="judge-wrong">× もういちど</button>
            </div>
            <h2>なぞってみよう！</h2>
       
            <div class="drawing-box">
                
                <canvas id="tracing-canvas"></canvas>
            </div>
            <p>かきおわったら、はなしてね</p>
        </div>
    </div>
<script type="module" src="game_logic_v2.js"></script>
</body>
</html>
